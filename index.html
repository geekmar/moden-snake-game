<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>现代化贪吃蛇</title>
<style>
  :root{
    --bg: #0f1225;
    --panel: rgba(255,255,255,0.06);
    --accent: #62f3a5;
    --accent2:#5aa8ff;
    --text:#e6f0ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: "Inter", "Microsoft YaHei", sans-serif;
    background: radial-gradient(1200px 600px at 50% -20%, #27335d 0%, #0f1225 60%, #090b16 100%);
    color: var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }
  .wrap{
    width:min(90vw, 560px);
    background: var(--panel);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    backdrop-filter: blur(10px);
    padding:20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
  }
  h1{
    font-size:20px;
    margin:0;
    letter-spacing:1px;
  }
  .info{
    display:flex;
    gap:16px;
    font-size:14px;
  }
  .badge{
    padding:6px 10px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    font-weight:600;
  }
  canvas{
    width:100%;
    aspect-ratio:1/1;
    display:block;
    border-radius:14px;
    background: #0b0f20;
    border:1px solid rgba(255,255,255,0.08);
  }
  .controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:12px;
    font-size:14px;
  }
  button{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    border:none;
    color:#0b0f20;
    font-weight:700;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
    transition: transform .15s ease, filter .2s;
  }
  button:hover{ transform: translateY(-1px); filter:brightness(1.08)}
  .tip{opacity:.7}
  .overlay{
    position: absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .overlay > div{
    padding:14px 20px;
    background:rgba(0,0,0,.6);
    border-radius:12px;
    text-align:center;
    border:1px solid rgba(255,255,255,.1);
  }
  .game{
    position:relative;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🐍 现代贪吃蛇</h1>
      <div class="info">
        <div class="badge">分数: <span id="score">0</span></div>
        <div class="badge">最高: <span id="best">0</span></div>
      </div>
    </header>

    <div class="game">
      <canvas id="game"></canvas>
      <div class="overlay" id="overlay" style="display:none">
        <div>
          <div id="msg">游戏结束</div>
          <small>按 Enter 或点击「开始」重新开始</small>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="tip">方向键 / WASD 控制，空格暂停</div>
      <button id="btn">开始</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const btn = document.getElementById('btn');
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('msg');

  let size = 20;      // 网格数量
  let tile = 20;      // 单格像素（动态调整）
  let snake, food, dir, nextDir, score, speed, running, paused;
  let lastTime = 0, acc = 0;

  const best = +localStorage.getItem('snake_best') || 0;
  bestEl.textContent = best;

  function resize() {
    const dpr = devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    tile = rect.width / size;
  }

  window.addEventListener('resize', resize);
  resize();

  function start() {
    snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    food = spawnFood();
    score = 0;
    speed = 8;
    running = true;
    paused = false;
    scoreEl.textContent = score;
    overlay.style.display = "none";
    btn.textContent = "暂停";
    lastTime = performance.now();
    acc = 0;
    requestAnimationFrame(loop);
  }

  function spawnFood() {
    let p;
    do{
      p = {x: Math.floor(Math.random()*size), y: Math.floor(Math.random()*size)};
    }while(snake.some(s => s.x === p.x && s.y === p.y));
    return p;
  }

  function update() {
    dir = nextDir;

    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // 撞墙或撞自己
    if (head.x < 0 || head.y < 0 || head.x >= size || head.y >= size ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    // 吃到食物
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score % 5 === 0) speed += 0.5; // 慢慢加速
      food = spawnFood();
    } else {
      snake.pop();
    }
  }

  function render() {
    // 背景
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0b0f20";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // 食物
    drawCell(food.x, food.y, "#ff6b6b");

    // 蛇
    snake.forEach((s, i) => {
      const color = i === 0 ? "#62f3a5" : "#3ad38c";
      drawCell(s.x, s.y, color, i === 0);
    });
  }

  function drawCell(x, y, color, glow=false) {
    const padding = 2;
    const px = x * tile + padding;
    const py = y * tile + padding;
    const w = tile - padding*2;

    ctx.fillStyle = color;
    if (glow) {
      ctx.shadowColor = "#62f3a5";
      ctx.shadowBlur = 10;
    } else {
      ctx.shadowBlur = 0;
    }

    // 圆角矩形
    ctx.beginPath();
    const r = 6;
    ctx.moveTo(px+r, py);
    ctx.arcTo(px+w, py, px+w, py+w, r);
    ctx.arcTo(px+w, py+w, px, py+w, r);
    ctx.arcTo(px, py+w, px, py, r);
    ctx.arcTo(px, py, px+w, py, r);
    ctx.closePath();
    ctx.fill();
  }

  function loop(t) {
    if (!running) return;
    if (paused) {
      requestAnimationFrame(loop);
      return;
    }

    acc += t - lastTime;
    lastTime = t;

    const step = 1000 / speed;
    while (acc >= step) {
      update();
      acc -= step;
    }
    render();
    requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    btn.textContent = "开始";
    msg.textContent = "游戏结束";
    overlay.style.display = "flex";

    const best = +localStorage.getItem('snake_best') || 0;
    if (score > best) {
      localStorage.setItem('snake_best', score);
      bestEl.textContent = score;
    }
  }

  function setDir(x,y) {
    // 防止反向
    if (snake.length > 1 && dir.x === -x && dir.y === -y) return;
    nextDir = {x,y};
  }

  // 键盘
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') setDir(0,-1);
    if (e.key === 'ArrowDown' || e.key === 's') setDir(0,1);
    if (e.key === 'ArrowLeft' || e.key === 'a') setDir(-1,0);
    if (e.key === 'ArrowRight' || e.key === 'd') setDir(1,0);
    if (e.key === ' ') togglePause();
    if (e.key === 'Enter' && !running) start();
  });

  function togglePause(){
    if (!running) return;
    paused = !paused;
    overlay.style.display = paused ? "flex" : "none";
    msg.textContent = paused ? "已暂停" : "";
    btn.textContent = paused ? "继续" : "暂停";
  }

  btn.addEventListener('click', () => {
    if (!running) start();
    else togglePause();
  });

  // 初始绘制
  snake = [{x:10,y:10}];
  food = {x:5, y:5};
  render();
})();
</script>
</body>
</html>
